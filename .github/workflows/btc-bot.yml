name: BTC Polymarket Bot

on:
  schedule:
    # Every 15 minutes — matches the BTC Up/Down market window
    - cron: "*/15 * * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to commit portfolio.json back

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch the full portfolio state (committed by previous runs)
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r btc-polymarket-bot/requirements.txt

      - name: Run one analysis cycle
        run: python btc-polymarket-bot/main.py --once

      - name: Commit updated portfolio state
        run: |
          git config user.name  "btc-bot[bot]"
          git config user.email "btc-bot@users.noreply.github.com"
          git add btc-polymarket-bot/portfolio.json
          # Only commit if portfolio.json actually changed
          git diff --cached --quiet || git commit -m "bot: update portfolio state [skip ci]"
          git push origin master
